<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#8b5cf6">
  <title>Réceptions — Pilotage rapprochement</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <style>
    :root {
      --purple:#8b5cf6; --purple-light:#f5f3ff; --purple-dark:#7c3aed;
      --orange:#f97316; --orange-bg:#fff7ed;
      --green:#22c55e; --green-bg:#f0fdf4; --green-dark:#16a34a;
      --red:#ef4444; --red-bg:#fef2f2; --red-dark:#dc2626;
      --blue:#3b82f6; --blue-bg:#eff6ff;
      --amber:#f59e0b; --amber-bg:#fffbeb;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-300:#d1d5db; --gray-400:#9ca3af; --gray-500:#6b7280;
      --gray-600:#4b5563; --gray-700:#374151; --gray-800:#1f2937;
      --radius:8px; --radius-sm:6px; --radius-lg:12px;
      --shadow:0 1px 3px rgba(0,0,0,.08);
      --shadow-md:0 4px 6px rgba(0,0,0,.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--gray-50); color:var(--gray-800);
      min-height:100vh; min-height:100dvh;
      padding-top:env(safe-area-inset-top);
      -webkit-tap-highlight-color:transparent;
    }
    .header {
      background:white; border-bottom:2px solid var(--purple);
      padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header h1 { font-size:1.15rem; color:var(--purple); font-weight:700; }
    .header-right { display:flex; align-items:center; gap:8px; font-size:.85rem; color:var(--gray-500); }
    .btn-back {
      padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--gray-200);
      background:white; color:var(--gray-600); font-size:.8rem; cursor:pointer;
      text-decoration:none; display:inline-flex; align-items:center; gap:4px;
    }
    .btn-back:hover { background:var(--gray-100); }

    .filters {
      background:white; border-bottom:1px solid var(--gray-200);
      padding:10px 16px; display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    }
    .chip {
      padding:6px 12px; border-radius:18px; border:1px solid var(--gray-200);
      background:white; font-size:.8rem; color:var(--gray-600); cursor:pointer;
      white-space:nowrap;
    }
    .chip.active { background:var(--purple); color:white; border-color:var(--purple); }
    .chip:hover:not(.active) { background:var(--gray-100); }
    .filter-sep { width:1px; height:24px; background:var(--gray-200); margin:0 4px; }
    .filter-input {
      padding:6px 10px; border:1px solid var(--gray-200); border-radius:var(--radius-sm);
      font-size:.85rem; background:white;
    }

    .content { padding:16px; padding-bottom:100px; max-width:1400px; margin:0 auto; }
    .screen { display:none; }
    .screen.active { display:block; }

    .stats-row {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:10px; margin-bottom:16px;
    }
    .stat-card {
      background:white; border-radius:var(--radius); padding:14px; text-align:center;
      box-shadow:var(--shadow); border:1px solid var(--gray-200);
    }
    .stat-card .number { font-size:1.6rem; font-weight:700; color:var(--purple); }
    .stat-card .label { font-size:.75rem; color:var(--gray-500); margin-top:2px; }
    .stat-card.green .number { color:var(--green-dark); }
    .stat-card.amber .number { color:var(--amber); }
    .stat-card.red .number { color:var(--red); }
    .stat-card.gray .number { color:var(--gray-500); }

    .table-wrap {
      background:white; border-radius:var(--radius-lg); overflow:hidden;
      box-shadow:var(--shadow); border:1px solid var(--gray-200);
    }
    table { width:100%; border-collapse:collapse; font-size:.88rem; }
    th, td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--gray-100); }
    th {
      background:var(--gray-50); font-weight:600; color:var(--gray-600);
      font-size:.78rem; text-transform:uppercase; letter-spacing:.03em;
      position:sticky; top:0;
    }
    tr.session-row { cursor:pointer; transition:background .1s; }
    tr.session-row:hover { background:var(--purple-light); }
    .badge {
      display:inline-block; padding:2px 9px; border-radius:11px;
      font-size:.7rem; font-weight:600; white-space:nowrap;
    }
    .badge-ok { background:var(--green-bg); color:var(--green-dark); }
    .badge-warn { background:var(--amber-bg); color:var(--amber); }
    .badge-critical { background:var(--red-bg); color:var(--red-dark); }
    .badge-gray { background:var(--gray-100); color:var(--gray-500); }
    .badge-purple { background:var(--purple-light); color:var(--purple-dark); }
    .badge-blue { background:var(--blue-bg); color:var(--blue); }

    .empty { text-align:center; padding:60px 20px; color:var(--gray-400); }
    .empty .icon { font-size:3rem; margin-bottom:10px; }
    .empty .text { font-size:.95rem; }

    /* Détail session */
    .session-header {
      background:white; border-radius:var(--radius-lg); padding:16px;
      margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--gray-200);
    }
    .session-header h2 { font-size:1.2rem; margin-bottom:8px; color:var(--gray-800); }
    .session-meta { display:flex; flex-wrap:wrap; gap:14px; font-size:.85rem; color:var(--gray-600); }
    .session-meta strong { color:var(--gray-800); font-weight:600; }
    .session-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }

    .btn {
      padding:9px 16px; border-radius:var(--radius); border:none;
      font-size:.85rem; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px;
      transition:all .15s;
    }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-primary { background:var(--purple); color:white; }
    .btn-primary:hover { background:var(--purple-dark); }
    .btn-success { background:var(--green); color:white; }
    .btn-success:hover { background:var(--green-dark); }
    .btn-danger { background:var(--red); color:white; }
    .btn-outline {
      background:white; color:var(--purple); border:1px solid var(--purple);
    }
    .btn-outline:hover { background:var(--purple-light); }
    .btn-ghost { background:transparent; color:var(--gray-600); }
    .btn-ghost:hover { background:var(--gray-100); }
    .btn-sm { padding:5px 10px; font-size:.78rem; }

    .resume-box {
      background:var(--purple-light); border-left:4px solid var(--purple);
      padding:12px 14px; border-radius:var(--radius-sm); margin-bottom:16px;
      font-size:.9rem; color:var(--gray-700);
    }
    .resume-box .lbl { font-weight:600; color:var(--purple-dark); margin-right:6px; }

    .section-title {
      font-size:1rem; font-weight:600; margin:18px 0 8px; color:var(--gray-700);
      display:flex; align-items:center; gap:8px;
    }
    .section-title .count {
      background:var(--gray-100); color:var(--gray-600);
      padding:1px 8px; border-radius:10px; font-size:.75rem;
    }

    .match-card {
      background:white; border-radius:var(--radius-lg); padding:14px;
      margin-bottom:10px; box-shadow:var(--shadow); border:1px solid var(--gray-200);
      border-left:4px solid var(--gray-300);
    }
    .match-card.s-ok { border-left-color:var(--green); }
    .match-card.s-mineur { border-left-color:var(--amber); }
    .match-card.s-significatif { border-left-color:var(--red); }
    .match-card.s-orphelin { border-left-color:var(--gray-400); }
    .match-head {
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      flex-wrap:wrap;
    }
    .match-bl-info { flex:1; min-width:200px; }
    .match-bl-info .desc { font-weight:600; font-size:.95rem; color:var(--gray-800); }
    .match-bl-info .num { font-size:.75rem; color:var(--gray-500); margin-top:2px; }
    .match-numbers { text-align:right; font-size:.85rem; }
    .match-numbers .qty-bl { color:var(--gray-600); }
    .match-numbers .qty-et { font-weight:600; }
    .match-numbers .ecart { font-size:.85rem; font-weight:700; margin-top:2px; }
    .match-numbers .ecart.ok { color:var(--green-dark); }
    .match-numbers .ecart.mineur { color:var(--amber); }
    .match-numbers .ecart.significatif { color:var(--red-dark); }

    .etiquettes-list { margin-top:10px; padding-top:10px; border-top:1px dashed var(--gray-200); }
    .etiquette-row {
      display:flex; align-items:center; gap:10px; padding:6px 0;
      border-bottom:1px solid var(--gray-50);
    }
    .etiquette-row:last-child { border-bottom:none; }
    .etiq-thumb {
      width:46px; height:46px; border-radius:var(--radius-sm); object-fit:cover;
      border:1px solid var(--gray-200); cursor:pointer; flex-shrink:0; background:var(--gray-100);
      display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:var(--gray-400);
    }
    .etiq-info { flex:1; font-size:.85rem; }
    .etiq-info .nom { font-weight:500; color:var(--gray-800); }
    .etiq-info .meta { font-size:.75rem; color:var(--gray-500); margin-top:1px; }
    .etiq-poids { font-weight:600; color:var(--gray-700); font-size:.9rem; }
    .etiq-actions { display:flex; gap:4px; }

    .anomalie-card {
      background:white; border-radius:var(--radius); padding:10px 14px;
      margin-bottom:6px; box-shadow:var(--shadow); border:1px solid var(--gray-200);
      border-left:4px solid var(--gray-300); font-size:.85rem;
    }
    .anomalie-card.sev-info { border-left-color:var(--blue); }
    .anomalie-card.sev-warn { border-left-color:var(--amber); }
    .anomalie-card.sev-critical { border-left-color:var(--red); }
    .anomalie-card .type { font-weight:600; color:var(--gray-700); font-size:.78rem; text-transform:uppercase; }
    .anomalie-card .desc { color:var(--gray-700); margin-top:2px; }

    /* MODAL */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:200; align-items:center; justify-content:center; padding:20px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:white; border-radius:var(--radius-lg); width:100%;
      max-width:560px; max-height:90vh; overflow-y:auto;
      box-shadow:0 20px 50px rgba(0,0,0,.3);
    }
    .modal-header {
      padding:14px 18px; border-bottom:1px solid var(--gray-200);
      display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; background:white; z-index:1;
    }
    .modal-header h3 { font-size:1.05rem; color:var(--gray-800); }
    .modal-close {
      width:30px; height:30px; border-radius:50%; border:none;
      background:var(--gray-100); font-size:1.1rem; cursor:pointer;
    }
    .modal-close:hover { background:var(--gray-200); }
    .modal-body { padding:18px; }
    .modal-footer {
      padding:12px 18px; border-top:1px solid var(--gray-200);
      display:flex; gap:8px; justify-content:flex-end;
    }
    .modal-img {
      width:100%; max-height:60vh; object-fit:contain; border-radius:var(--radius);
      background:var(--gray-100); margin-bottom:14px; cursor:zoom-in;
    }
    .img-placeholder {
      width:100%; height:200px; background:var(--gray-100); border-radius:var(--radius);
      display:flex; align-items:center; justify-content:center; color:var(--gray-400);
      font-size:.9rem; margin-bottom:14px;
    }
    .field-row { margin-bottom:12px; }
    .field-row label {
      display:block; font-size:.78rem; font-weight:600; color:var(--gray-600);
      margin-bottom:4px; text-transform:uppercase; letter-spacing:.02em;
    }
    .field-row input, .field-row textarea, .field-row select {
      width:100%; padding:8px 11px; border:1px solid var(--gray-200);
      border-radius:var(--radius-sm); font-size:.9rem; background:white;
      color:var(--gray-800); -webkit-appearance:none;
    }
    .field-row input:focus, .field-row textarea:focus {
      outline:none; border-color:var(--purple); box-shadow:0 0 0 3px rgba(139,92,246,.15);
    }
    .field-row .row { display:flex; gap:8px; }
    .field-row .row > * { flex:1; }
    .field-row .hint { font-size:.72rem; color:var(--gray-400); margin-top:3px; }
    .pin-input {
      letter-spacing:.5em; font-size:1.4rem !important; text-align:center;
      font-family:'SF Mono',Menlo,monospace !important;
    }

    /* TOAST */
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:var(--gray-800); color:white; padding:11px 22px;
      border-radius:22px; font-size:.88rem; z-index:400;
      opacity:0; transition:opacity .25s; pointer-events:none;
      box-shadow:0 4px 12px rgba(0,0,0,.2);
    }
    .toast.show { opacity:1; }
    .toast.success { background:var(--green-dark); }
    .toast.error { background:var(--red-dark); }

    /* SPINNER */
    .spinner {
      display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3);
      border-top-color:white; border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .full-loader {
      display:flex; align-items:center; justify-content:center; padding:40px;
      color:var(--gray-500); font-size:.9rem; gap:10px;
    }
    .full-loader .spinner { border-color:rgba(139,92,246,.2); border-top-color:var(--purple); width:20px; height:20px; }

    @media (max-width:640px) {
      .filters { gap:6px; }
      .stat-card .number { font-size:1.3rem; }
      th, td { padding:8px 6px; font-size:.8rem; }
      .col-hide-mobile { display:none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="../" class="btn-back">← Accueil</a>
    <h1>📋 Réceptions — Pilotage</h1>
  </div>
  <div class="header-right">
    <span id="header-etab">—</span> · <span id="header-user">—</span>
  </div>
</header>

<!-- ========== SCREEN 1 : LISTE ========== -->
<section id="screen-list" class="screen active">
  <div class="filters">
    <span style="font-size:.78rem; color:var(--gray-500); font-weight:600;">Établissement :</span>
    <button class="chip" data-etab="all" onclick="setFilterEtab('all')">Tous</button>
    <button class="chip active" data-etab="freddy" onclick="setFilterEtab('freddy')">Freddy</button>
    <button class="chip" data-etab="liesel" onclick="setFilterEtab('liesel')">Liesel</button>
    <span class="filter-sep"></span>
    <span style="font-size:.78rem; color:var(--gray-500); font-weight:600;">Période :</span>
    <input type="date" id="date-from" class="filter-input" onchange="reloadSessions()">
    <span style="color:var(--gray-400);">→</span>
    <input type="date" id="date-to" class="filter-input" onchange="reloadSessions()">
    <span class="filter-sep"></span>
    <span style="font-size:.78rem; color:var(--gray-500); font-weight:600;">Statut :</span>
    <button class="chip active" data-statut="all" onclick="setFilterStatut('all')">Tous</button>
    <button class="chip" data-statut="ecarts" onclick="setFilterStatut('ecarts')">⚠️ Avec écarts</button>
    <button class="chip" data-statut="ok" onclick="setFilterStatut('ok')">✅ OK</button>
    <button class="chip" data-statut="non_rapprochee" onclick="setFilterStatut('non_rapprochee')">⚪ Non rapprochée</button>
  </div>

  <div class="content">
    <div class="stats-row" id="stats-row"></div>
    <div id="list-container">
      <div class="full-loader"><div class="spinner"></div> Chargement…</div>
    </div>
  </div>
</section>

<!-- ========== SCREEN 2 : DÉTAIL ========== -->
<section id="screen-detail" class="screen">
  <div class="content">
    <button class="btn btn-ghost" onclick="goBackToList()" style="margin-bottom:14px;">← Retour à la liste</button>
    <div id="detail-container">
      <div class="full-loader"><div class="spinner"></div> Chargement du rapprochement…</div>
    </div>
  </div>
</section>

<!-- ========== MODAL ÉDITION ÉTIQUETTE ========== -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <h3>🏷️ Édition étiquette</h3>
      <button class="modal-close" onclick="closeEdit()">×</button>
    </div>
    <div class="modal-body" id="modal-edit-body">
      <div class="full-loader"><div class="spinner"></div> Chargement de l'image…</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEdit()">Annuler</button>
      <button class="btn btn-primary" onclick="saveEdit()" id="btn-save-edit">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ========== MODAL VALIDATION ADMIN ========== -->
<div class="modal-overlay" id="modal-validate">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header">
      <h3>🔒 Validation admin requise</h3>
      <button class="modal-close" onclick="closeValidate()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.88rem; color:var(--gray-600); margin-bottom:12px;">
        Saisis ton code admin (6 chiffres) pour valider définitivement cette session de réception.
      </p>
      <div class="field-row">
        <label>Code PIN</label>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6"
               id="pin-validate" class="pin-input" autocomplete="off" placeholder="••••••">
      </div>
      <div class="field-row">
        <label>Observation (optionnel)</label>
        <textarea id="obs-validate" rows="2" placeholder="Litige fournisseur ouvert, avoir attendu, etc."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeValidate()">Annuler</button>
      <button class="btn btn-success" onclick="confirmValidate()" id="btn-confirm-validate">✓ Valider</button>
    </div>
  </div>
</div>

<!-- ========== VIEWER PHOTO ========== -->
<div class="modal-overlay" id="modal-viewer" style="background:rgba(0,0,0,.92); padding:0;" onclick="closeViewer()">
  <img id="viewer-img" style="max-width:95%; max-height:95vh; object-fit:contain; border-radius:8px;">
  <button class="modal-close" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,.2); color:white;" onclick="event.stopPropagation(); closeViewer()">×</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ====== CONFIG ======
  const SUPABASE_URL = 'https://dzrherfavgiuygnimtux.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cmhlcmZhdmdpdXlnbmltdHV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDQ2MzYsImV4cCI6MjA5MDA4MDYzNn0.4LVwGERblZ0R5EP9EEql639TAojQEEyj2dV9K3sMxMQ';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const RECONCILE_FN_URL = `${SUPABASE_URL}/functions/v1/reconcile-session`;

  // ====== AUTH ======
  function getSession() {
    const userJson = sessionStorage.getItem('planb_user');
    const etab = sessionStorage.getItem('planb_etablissement');
    if (!userJson || !etab) return null;
    try { return { user: JSON.parse(userJson), etablissement: etab }; } catch { return null; }
  }
  const userSession = getSession();
  if (!userSession) window.location.href = '../';
  const currentUser = userSession.user;
  const currentEtab = userSession.etablissement;
  document.getElementById('header-etab').textContent = currentEtab === 'liesel' ? 'Liesel' : 'Freddy';
  document.getElementById('header-user').textContent = currentUser.initiales || currentUser.nom;

  // ====== STATE ======
  const State = {
    filterEtab: currentEtab,           // par défaut : son resto
    filterStatut: 'all',
    dateFrom: null, dateTo: null,
    sessions: [],
    currentSession: null,
    currentScans: {},                  // map scan_id => {scan, trac}
    blScan: null,
    blLignes: [],
    editingScanId: null,
    editingTrac: null,
  };
  // Chip établissement par défaut
  document.querySelectorAll('.chip[data-etab]').forEach(c => c.classList.toggle('active', c.dataset.etab === currentEtab));
  // Période par défaut : 30 derniers jours
  (function initDates() {
    const today = new Date();
    const past = new Date(today.getTime() - 30 * 86400000);
    document.getElementById('date-to').value = today.toISOString().slice(0, 10);
    document.getElementById('date-from').value = past.toISOString().slice(0, 10);
    State.dateFrom = past.toISOString().slice(0, 10);
    State.dateTo = today.toISOString().slice(0, 10);
  })();

  // ====== UTILS ======
  function $(id) { return document.getElementById(id); }
  function showToast(msg, kind = '') {
    const t = $('toast');
    t.textContent = msg; t.className = 'toast show ' + kind;
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $('screen-' + name).classList.add('active');
    window.scrollTo(0, 0);
  }
  function fmtDate(d) {
    if (!d) return '—';
    const dt = typeof d === 'string' ? new Date(d) : d;
    return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }
  function fmtTime(d) {
    if (!d) return '—';
    return new Date(d).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }
  function fmtKg(v) {
    if (v == null || v === '') return '—';
    const n = parseFloat(v);
    return isNaN(n) ? '—' : n.toFixed(3) + ' kg';
  }
  function fmtPct(v) {
    if (v == null || v === '') return '—';
    const n = parseFloat(v);
    if (isNaN(n)) return '—';
    return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
  }
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }
  function statutBadge(s) {
    const r = s.rapprochement_jsonb;
    if (s.statut === 'validee' && s.date_validation) {
      return `<span class="badge badge-ok">✅ Validée</span>`;
    }
    if (!r) return `<span class="badge badge-gray">⚪ Non rapprochée</span>`;
    const totaux = r.totaux || {};
    const crit = totaux.nb_anomalies_critical || 0;
    const warn = totaux.nb_anomalies_warn || 0;
    if (crit > 0) return `<span class="badge badge-critical">🔴 ${crit} critique${crit > 1 ? 's' : ''}</span>`;
    if (warn > 0) return `<span class="badge badge-warn">🟠 ${warn} alerte${warn > 1 ? 's' : ''}</span>`;
    return `<span class="badge badge-ok">🟢 OK</span>`;
  }

  // ====== FILTRES ======
  function setFilterEtab(e) {
    State.filterEtab = e;
    document.querySelectorAll('.chip[data-etab]').forEach(c => c.classList.toggle('active', c.dataset.etab === e));
    reloadSessions();
  }
  function setFilterStatut(s) {
    State.filterStatut = s;
    document.querySelectorAll('.chip[data-statut]').forEach(c => c.classList.toggle('active', c.dataset.statut === s));
    renderList();
  }

  // ====== LISTE SESSIONS ======
  async function reloadSessions() {
    const from = $('date-from').value;
    const to = $('date-to').value;
    State.dateFrom = from; State.dateTo = to;
    $('list-container').innerHTML = '<div class="full-loader"><div class="spinner"></div> Chargement…</div>';
    let q = sb.from('scan_sessions').select('*').gte('date_reception', from).lte('date_reception', to).order('date_reception', { ascending: false }).order('created_at', { ascending: false });
    if (State.filterEtab !== 'all') q = q.eq('etablissement', State.filterEtab);
    const { data, error } = await q;
    if (error) {
      $('list-container').innerHTML = `<div class="empty"><div class="icon">❌</div><div class="text">Erreur : ${escapeHtml(error.message)}</div></div>`;
      return;
    }
    // Ajouter le nb_etiquettes calculé via une 2e query
    const ids = (data || []).map(s => s.id);
    let etqCounts = {};
    if (ids.length > 0) {
      const { data: scs } = await sb.from('scans')
        .select('session_id, type_document')
        .in('session_id', ids);
      (scs || []).forEach(sc => {
        if (sc.type_document === 'etiquette_produit') {
          etqCounts[sc.session_id] = (etqCounts[sc.session_id] || 0) + 1;
        }
      });
    }
    State.sessions = (data || []).map(s => ({ ...s, nb_etq_calc: etqCounts[s.id] || 0 }));
    renderList();
  }

  function renderList() {
    let sessions = State.sessions;
    if (State.filterStatut !== 'all') {
      sessions = sessions.filter(s => {
        const r = s.rapprochement_jsonb;
        if (State.filterStatut === 'non_rapprochee') return !r;
        if (!r) return false;
        const t = r.totaux || {};
        if (State.filterStatut === 'ecarts') return (t.nb_anomalies_critical || 0) + (t.nb_anomalies_warn || 0) > 0;
        if (State.filterStatut === 'ok') return (t.nb_anomalies_critical || 0) + (t.nb_anomalies_warn || 0) === 0;
        return true;
      });
    }

    // Stats
    const stats = {
      total: State.sessions.length,
      ok: 0, warn: 0, critical: 0, non_rapprochee: 0, validee: 0
    };
    State.sessions.forEach(s => {
      if (s.statut === 'validee' && s.date_validation) { stats.validee++; return; }
      const r = s.rapprochement_jsonb;
      if (!r) { stats.non_rapprochee++; return; }
      const t = r.totaux || {};
      if ((t.nb_anomalies_critical || 0) > 0) stats.critical++;
      else if ((t.nb_anomalies_warn || 0) > 0) stats.warn++;
      else stats.ok++;
    });
    $('stats-row').innerHTML = `
      <div class="stat-card"><div class="number">${stats.total}</div><div class="label">Sessions</div></div>
      <div class="stat-card green"><div class="number">${stats.ok}</div><div class="label">🟢 OK</div></div>
      <div class="stat-card amber"><div class="number">${stats.warn}</div><div class="label">🟠 Alertes</div></div>
      <div class="stat-card red"><div class="number">${stats.critical}</div><div class="label">🔴 Critiques</div></div>
      <div class="stat-card gray"><div class="number">${stats.non_rapprochee}</div><div class="label">⚪ Non rapproch.</div></div>
      <div class="stat-card green"><div class="number">${stats.validee}</div><div class="label">✅ Validées</div></div>
    `;

    if (sessions.length === 0) {
      $('list-container').innerHTML = `<div class="empty"><div class="icon">📭</div><div class="text">Aucune session pour ces filtres</div></div>`;
      return;
    }

    const rows = sessions.map(s => {
      const r = s.rapprochement_jsonb;
      const totaux = r?.totaux || {};
      const nbBl = totaux.nb_lignes_bl ?? '—';
      const nbEtq = s.nb_etq_calc;
      const montant = totaux.montant_total_bl_ht;
      return `
        <tr class="session-row" onclick="openDetail('${s.id}')">
          <td>${fmtDate(s.date_reception)}<br><span style="font-size:.7rem; color:var(--gray-400);">${fmtTime(s.created_at)}</span></td>
          <td><span class="badge badge-purple">${s.etablissement === 'liesel' ? 'Liesel' : 'Freddy'}</span></td>
          <td><strong>${escapeHtml(s.fournisseur_nom || '—')}</strong></td>
          <td class="col-hide-mobile">${nbEtq} étiq. / ${nbBl} lignes</td>
          <td class="col-hide-mobile">${montant != null ? Number(montant).toFixed(2) + ' €' : '—'}</td>
          <td>${statutBadge(s)}</td>
          <td style="text-align:right;">→</td>
        </tr>
      `;
    }).join('');

    $('list-container').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Resto</th><th>Fournisseur</th>
            <th class="col-hide-mobile">Volumes</th>
            <th class="col-hide-mobile">Montant HT</th>
            <th>Statut</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // ====== DÉTAIL ======
  async function openDetail(sessionId) {
    showScreen('detail');
    $('detail-container').innerHTML = '<div class="full-loader"><div class="spinner"></div> Chargement du rapprochement…</div>';
    State.currentSession = null; State.currentScans = {}; State.blScan = null; State.blLignes = [];

    // Session
    const { data: session, error: sErr } = await sb.from('scan_sessions').select('*').eq('id', sessionId).single();
    if (sErr || !session) {
      $('detail-container').innerHTML = `<div class="empty"><div class="icon">❌</div><div class="text">Session introuvable</div></div>`;
      return;
    }
    State.currentSession = session;

    // Scans (étiquettes + BL) + tracabilité
    const { data: scans } = await sb.from('scans')
      .select('id, type_document, statut, storage_path, mime_type, claude_extraction_jsonb, claude_erreur_message, confiance_globale, scan_tracabilite(*)')
      .eq('session_id', sessionId);
    (scans || []).forEach(sc => {
      const trac = Array.isArray(sc.scan_tracabilite) ? sc.scan_tracabilite[0] : sc.scan_tracabilite;
      State.currentScans[sc.id] = { scan: sc, trac };
      if (sc.type_document === 'bl_facture') State.blScan = sc;
    });

    // Lignes BL
    if (session.bl_facture_scan_id) {
      const { data: lignes } = await sb.from('scan_lignes')
        .select('*').eq('scan_id', session.bl_facture_scan_id).order('ligne_num');
      State.blLignes = lignes || [];
    }

    renderDetail();
  }

  function goBackToList() {
    showScreen('list');
    State.currentSession = null;
  }

  function renderDetail() {
    const s = State.currentSession;
    const r = s.rapprochement_jsonb;
    const blExtr = State.blScan?.claude_extraction_jsonb || {};
    const isValidated = s.statut === 'validee' && s.date_validation;
    // Détection : un re-rapprochement plus récent que la validation = à re-valider
    const needsRevalidation = isValidated && s.rapprochement_at && new Date(s.rapprochement_at) > new Date(s.date_validation);

    let html = `
      <div class="session-header">
        <h2>${escapeHtml(s.fournisseur_nom || 'Session sans fournisseur')}</h2>
        <div class="session-meta">
          <span><strong>📅</strong> ${fmtDate(s.date_reception)}</span>
          <span><strong>🏠</strong> ${s.etablissement === 'liesel' ? 'Liesel' : 'Freddy'}</span>
          ${blExtr.numero_document ? `<span><strong>📄 N°</strong> ${escapeHtml(blExtr.numero_document)}</span>` : ''}
          ${blExtr.total_ht ? `<span><strong>HT</strong> ${Number(blExtr.total_ht).toFixed(2)} €</span>` : ''}
          ${blExtr.total_ttc ? `<span><strong>TTC</strong> ${Number(blExtr.total_ttc).toFixed(2)} €</span>` : ''}
          <span><strong>👤</strong> ${escapeHtml(s.created_by_nom || '—')}</span>
          ${isValidated ? `<span><strong>✅ Validée</strong> ${fmtDate(s.date_validation)} par ${escapeHtml(s.validee_par_nom || '—')}${s.observation_validation ? ' — ' + escapeHtml(s.observation_validation) : ''}</span>` : ''}
        </div>
        ${needsRevalidation ? `<div class="resume-box" style="background:var(--amber-bg); border-left-color:var(--amber); margin-top:10px;"><span class="lbl" style="color:var(--amber);">⚠️ Re-rapprochement après validation :</span>le rapprochement IA a été relancé après ta validation. Pense à re-valider en tant qu'admin si tu confirmes les nouveaux résultats.</div>` : ''}
        <div class="session-actions">
          <button class="btn btn-outline" onclick="rerunRapprochement()" id="btn-rerun" ${!s.bl_facture_scan_id ? 'disabled' : ''}>
            🔄 Re-rapprocher avec l'IA
          </button>
          ${r ? `<button class="btn btn-success" onclick="openValidate()">${isValidated ? '🔒 Re-valider en tant qu&apos;admin' : '✓ Valider la session'}</button>` : ''}
        </div>
      </div>
    `;

    if (!s.bl_facture_scan_id) {
      html += `<div class="empty"><div class="icon">📄</div><div class="text">Aucune facture/BL n'est rattachée à cette session.<br>Le rapprochement n'est pas possible.</div></div>`;
      $('detail-container').innerHTML = html;
      return;
    }

    if (!r) {
      html += `<div class="empty"><div class="icon">🤖</div><div class="text">Cette session n'a pas encore été rapprochée.<br>Clique sur "Re-rapprocher avec l'IA" pour lancer l'analyse.</div></div>`;
      $('detail-container').innerHTML = html;
      return;
    }

    // Résumé IA
    if (r.resume_humain) {
      html += `<div class="resume-box"><span class="lbl">🤖 Résumé IA :</span>${escapeHtml(r.resume_humain)} <span style="color:var(--gray-400); font-size:.78rem;">(confiance ${r.confiance_globale ?? '?'}%)</span></div>`;
    }

    // Stats rapprochement
    const t = r.totaux || {};
    html += `
      <div class="stats-row">
        <div class="stat-card"><div class="number">${t.nb_lignes_bl ?? '—'}</div><div class="label">Lignes facture</div></div>
        <div class="stat-card"><div class="number">${t.nb_etiquettes ?? '—'}</div><div class="label">Étiquettes scannées</div></div>
        <div class="stat-card green"><div class="number">${t.nb_matchs_complets ?? 0}</div><div class="label">Matchs complets</div></div>
        <div class="stat-card amber"><div class="number">${t.nb_anomalies_warn ?? 0}</div><div class="label">Alertes</div></div>
        <div class="stat-card red"><div class="number">${t.nb_anomalies_critical ?? 0}</div><div class="label">Critiques</div></div>
      </div>
    `;

    // Matchs lignes BL
    const matchs = r.matchs || [];
    html += `<div class="section-title">📋 Rapprochement lignes facture <span class="count">${matchs.length}</span></div>`;
    matchs.forEach(m => {
      const sc = m.statut_match || 'orphelin';
      const ecartCls = sc === 'ok' ? 'ok' : (sc === 'ecart_mineur' ? 'mineur' : 'significatif');
      const ecartTxt = m.ecart_qte != null ? `${m.ecart_qte > 0 ? '+' : ''}${parseFloat(m.ecart_qte).toFixed(3)} ${m.unite_bl || 'kg'} (${fmtPct(m.ecart_pct)})` : '—';
      const etiquettes = (m.etiquette_ids || []).map(eid => renderEtiquetteRow(eid)).join('');
      html += `
        <div class="match-card s-${sc.replace('ecart_','')}">
          <div class="match-head">
            <div class="match-bl-info">
              <div class="desc">${escapeHtml(m.designation_bl || '—')}</div>
              <div class="num">Ligne ${m.ligne_bl_num ?? '?'}</div>
            </div>
            <div class="match-numbers">
              <div class="qty-bl">Facturé : <strong>${m.qte_bl ?? '?'} ${m.unite_bl || ''}</strong></div>
              <div class="qty-et">Reçu : <strong>${m.qte_etiquettes_total != null ? parseFloat(m.qte_etiquettes_total).toFixed(3) + ' ' + (m.unite_bl || 'kg') : '—'}</strong></div>
              <div class="ecart ${ecartCls}">${ecartTxt}</div>
            </div>
          </div>
          ${etiquettes ? `<div class="etiquettes-list">${etiquettes}</div>` : ''}
        </div>
      `;
    });

    // Étiquettes orphelines (déduites des anomalies)
    const orphelinIds = new Set();
    (r.anomalies || []).forEach(a => {
      if (a.type === 'etiquette_orpheline' && a.etiquette_id) orphelinIds.add(a.etiquette_id);
    });
    if (orphelinIds.size > 0) {
      html += `<div class="section-title">🚫 Étiquettes orphelines <span class="count">${orphelinIds.size}</span></div>`;
      html += '<div class="match-card s-orphelin"><div class="etiquettes-list" style="border:none; margin:0; padding:0;">';
      orphelinIds.forEach(eid => { html += renderEtiquetteRow(eid); });
      html += '</div></div>';
    }

    // Anomalies
    const anomalies = r.anomalies || [];
    if (anomalies.length > 0) {
      html += `<div class="section-title">⚠️ Anomalies détaillées <span class="count">${anomalies.length}</span></div>`;
      anomalies.forEach(a => {
        html += `
          <div class="anomalie-card sev-${a.severite || 'info'}">
            <span class="type">${(a.severite || 'info').toUpperCase()} · ${escapeHtml(a.type || '')}</span>
            <div class="desc">${escapeHtml(a.description || '')}</div>
          </div>
        `;
      });
    }

    $('detail-container').innerHTML = html;
  }

  function renderEtiquetteRow(scanId) {
    const item = State.currentScans[scanId];
    if (!item) return `<div class="etiquette-row"><div class="etiq-info" style="color:var(--red);">⚠️ Étiquette ${scanId} introuvable</div></div>`;
    const { scan, trac } = item;
    const nom = trac?.produit || '<em style="color:var(--red);">(non extrait)</em>';
    const meta = [
      trac?.lot ? `Lot ${escapeHtml(trac.lot)}` : null,
      trac?.dlc ? `DLC ${fmtDate(trac.dlc)}` : null,
      trac?.fabricant ? escapeHtml(trac.fabricant) : null,
      scan.statut === 'erreur' ? '🔴 Erreur DB' : null,
    ].filter(Boolean).join(' · ');
    const poids = trac?.poids_net_kg ? fmtKg(trac.poids_net_kg) : '<span style="color:var(--red);">poids ?</span>';
    return `
      <div class="etiquette-row">
        <div class="etiq-thumb" onclick="viewPhoto('${scan.id}')" title="Voir la photo">📷</div>
        <div class="etiq-info">
          <div class="nom">${nom}</div>
          <div class="meta">${meta || '<em style="color:var(--gray-400);">aucune métadonnée</em>'}</div>
        </div>
        <div class="etiq-poids">${poids}</div>
        <div class="etiq-actions">
          <button class="btn btn-outline btn-sm" onclick="openEdit('${scan.id}')">✏️ Corriger</button>
        </div>
      </div>
    `;
  }

  // ====== PHOTO VIEWER ======
  async function viewPhoto(scanId) {
    const item = State.currentScans[scanId];
    if (!item || !item.scan.storage_path) { showToast('Pas de photo associée', 'error'); return; }
    const { data, error } = await sb.storage.from('scans').createSignedUrl(item.scan.storage_path, 600);
    if (error) { showToast('Erreur signed URL : ' + error.message, 'error'); return; }
    $('viewer-img').src = data.signedUrl;
    $('modal-viewer').classList.add('show');
  }
  function closeViewer() {
    $('modal-viewer').classList.remove('show');
    $('viewer-img').src = '';
  }

  // ====== EDIT ÉTIQUETTE ======
  async function openEdit(scanId) {
    const item = State.currentScans[scanId];
    if (!item) return;
    State.editingScanId = scanId;
    State.editingTrac = item.trac || {};

    let imgHtml = '';
    if (item.scan.storage_path) {
      const { data, error } = await sb.storage.from('scans').createSignedUrl(item.scan.storage_path, 600);
      if (!error && data?.signedUrl) {
        imgHtml = `<img src="${data.signedUrl}" class="modal-img" onclick="viewPhoto('${scanId}')" alt="Étiquette">`;
      } else {
        imgHtml = `<div class="img-placeholder">⚠️ Photo introuvable</div>`;
      }
    } else {
      imgHtml = `<div class="img-placeholder">📷 Pas de photo enregistrée</div>`;
    }

    const t = item.trac || {};
    const errMsg = item.scan.statut === 'erreur' ? `<div class="resume-box" style="background:var(--red-bg); border-left-color:var(--red);"><span class="lbl">🔴 Erreur DB :</span>${escapeHtml(item.scan.claude_erreur_message || '')}</div>` : '';

    $('modal-edit-body').innerHTML = `
      ${imgHtml}
      ${errMsg}
      <div class="field-row">
        <label>Produit</label>
        <input type="text" id="edit-produit" value="${escapeHtml(t.produit || '')}" placeholder="Ex : Escalopes de poulet sous vide">
      </div>
      <div class="field-row">
        <label>Fabricant</label>
        <input type="text" id="edit-fabricant" value="${escapeHtml(t.fabricant || '')}" placeholder="Ex : Distribution Iller">
      </div>
      <div class="field-row">
        <div class="row">
          <div>
            <label>Lot</label>
            <input type="text" id="edit-lot" value="${escapeHtml(t.lot || '')}" placeholder="Ex : 4180412026">
          </div>
          <div>
            <label>Poids net (kg)</label>
            <input type="number" step="0.001" id="edit-poids" value="${t.poids_net_kg || ''}" placeholder="2.500">
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="row">
          <div>
            <label>DLC</label>
            <input type="date" id="edit-dlc" value="${t.dlc || ''}">
          </div>
          <div>
            <label>DDM</label>
            <input type="date" id="edit-ddm" value="${t.ddm || ''}">
          </div>
        </div>
        <div class="hint">DLC = Date Limite de Consommation (frais) · DDM = Date de Durabilité Minimale (épicerie)</div>
      </div>
    `;
    $('modal-edit').classList.add('show');
  }
  function closeEdit() {
    $('modal-edit').classList.remove('show');
    State.editingScanId = null;
  }
  async function saveEdit() {
    const scanId = State.editingScanId;
    if (!scanId) return;
    const btn = $('btn-save-edit');
    btn.innerHTML = '<span class="spinner"></span> Enregistrement…'; btn.disabled = true;

    const updates = {
      produit: $('edit-produit').value.trim() || null,
      fabricant: $('edit-fabricant').value.trim() || null,
      lot: $('edit-lot').value.trim() || null,
      poids_net_kg: $('edit-poids').value ? parseFloat($('edit-poids').value) : null,
      dlc: $('edit-dlc').value || null,
      ddm: $('edit-ddm').value || null,
    };

    // Si pas encore d'enregistrement scan_tracabilite, INSERT, sinon UPDATE
    const existing = State.editingTrac && State.editingTrac.id;
    let res;
    if (existing) {
      res = await sb.from('scan_tracabilite').update(updates).eq('id', State.editingTrac.id);
    } else {
      res = await sb.from('scan_tracabilite').insert({ scan_id: scanId, ...updates, confiance: 100 });
    }

    btn.innerHTML = 'Enregistrer'; btn.disabled = false;
    if (res.error) { showToast('Erreur : ' + res.error.message, 'error'); return; }

    // Si le scan était en erreur DB, on remet "valide"
    if (State.currentScans[scanId].scan.statut === 'erreur') {
      await sb.from('scans').update({ statut: 'valide', claude_erreur_message: null }).eq('id', scanId);
    }

    showToast('Étiquette enregistrée. Pense à relancer le rapprochement.', 'success');
    closeEdit();
    // Refresh détail
    openDetail(State.currentSession.id);
  }

  // ====== RE-RAPPROCHEMENT ======
  async function rerunRapprochement() {
    const sessionId = State.currentSession?.id;
    if (!sessionId) return;
    const btn = $('btn-rerun');
    btn.innerHTML = '<span class="spinner"></span> Rapprochement IA en cours… (~10-20s)'; btn.disabled = true;
    try {
      const resp = await fetch(RECONCILE_FN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ session_id: sessionId }),
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      showToast(`Rapprochement OK · ${data.anomalies_count} anomalie(s) · ${(data.cost_usd * 100).toFixed(2)} cents`, 'success');
      openDetail(sessionId);
    } catch (e) {
      showToast('Erreur : ' + e.message, 'error');
      btn.innerHTML = '🔄 Re-rapprocher avec l\'IA'; btn.disabled = false;
    }
  }

  // ====== VALIDATION ADMIN ======
  function openValidate() {
    $('pin-validate').value = '';
    $('obs-validate').value = '';
    $('modal-validate').classList.add('show');
    setTimeout(() => $('pin-validate').focus(), 100);
  }
  function closeValidate() {
    $('modal-validate').classList.remove('show');
  }
  async function confirmValidate() {
    const pin = $('pin-validate').value.trim();
    if (!/^\d{6}$/.test(pin)) { showToast('Code admin = 6 chiffres', 'error'); return; }
    const btn = $('btn-confirm-validate');
    btn.innerHTML = '<span class="spinner"></span> Vérification…'; btn.disabled = true;

    const { data: users, error } = await sb.from('users')
      .select('id, nom, role, actif').eq('code', pin).eq('actif', true);
    if (error) { showToast('Erreur : ' + error.message, 'error'); btn.innerHTML = '✓ Valider'; btn.disabled = false; return; }
    if (!users || users.length === 0 || users[0].role !== 'admin') {
      showToast('Code refusé (admin uniquement)', 'error');
      btn.innerHTML = '✓ Valider'; btn.disabled = false; return;
    }
    const adm = users[0];

    const { error: upErr } = await sb.from('scan_sessions').update({
      statut: 'validee',
      validee_par_id: adm.id,
      validee_par_nom: adm.nom,
      date_validation: new Date().toISOString(),
      observation_validation: $('obs-validate').value.trim() || null,
    }).eq('id', State.currentSession.id);

    btn.innerHTML = '✓ Valider'; btn.disabled = false;
    if (upErr) { showToast('Erreur : ' + upErr.message, 'error'); return; }
    showToast(`Session validée par ${adm.nom}`, 'success');
    closeValidate();
    openDetail(State.currentSession.id);
  }

  // ====== INIT ======
  reloadSessions();
</script>

</body>
</html>
