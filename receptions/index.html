<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Receptions">
  <meta name="theme-color" content="#8b5cf6">
  <title>Receptions - PlanB Tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚛</text></svg>">
  <style>
    :root {
      --purple: #8b5cf6; --purple-light: #f5f3ff; --purple-dark: #7c3aed;
      --orange: #f97316; --orange-light: #fff7ed;
      --green: #22c55e; --green-bg: #f0fdf4; --green-dark: #16a34a;
      --red: #ef4444; --red-bg: #fef2f2;
      --blue: #3b82f6; --blue-bg: #eff6ff;
      --amber: #f59e0b; --amber-bg: #fffbeb;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
      --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
      --radius: 8px; --radius-sm: 6px; --radius-lg: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.1);
      --shadow-md: 0 4px 6px rgba(0,0,0,.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50); color: var(--gray-800);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      padding-top: env(safe-area-inset-top);
    }

    /* HEADER */
    .header {
      background: white; border-bottom: 2px solid var(--purple);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 1.2rem; color: var(--purple); font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--gray-500); }
    .btn-back {
      padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--gray-200);
      background: white; color: var(--gray-600); font-size: 0.8rem; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-back:active { background: var(--gray-100); }

    /* TABS */
    .tabs-bar {
      background: white; border-bottom: 1px solid var(--gray-200);
      display: flex; padding: 0 8px; overflow-x: auto;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; border: none; background: none;
      font-size: 0.85rem; font-weight: 500; color: var(--gray-400);
      cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all .2s;
    }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 600; }
    .tab-btn:active { background: var(--purple-light); }

    /* SUB-TABS for factures/etiquettes sections */
    .sub-tabs {
      display: flex; gap: 6px; padding: 10px 16px;
      background: white; border-bottom: 1px solid var(--gray-200);
    }
    .sub-tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--gray-200); background: white;
      font-size: 0.8rem; color: var(--gray-500); cursor: pointer;
    }
    .sub-tab.active {
      background: var(--purple); color: white; border-color: var(--purple);
    }
    .sub-tab:active { opacity: .8; }

    /* DATE BAR */
    .date-bar {
      background: white; border-bottom: 1px solid var(--gray-200);
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .date-nav-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gray-200);
      background: white; color: var(--purple); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .date-nav-btn:active { background: var(--purple-light); }
    .date-display {
      font-size: 1rem; font-weight: 600; color: var(--gray-800);
      min-width: 200px; text-align: center;
    }
    .date-display .day-name { color: var(--purple); text-transform: capitalize; }
    .btn-today {
      padding: 4px 10px; border-radius: 12px; border: 1px solid var(--gray-200);
      background: white; font-size: 0.75rem; color: var(--gray-500); cursor: pointer;
    }
    .btn-today:active { background: var(--purple-light); }

    /* CONTENT */
    .content { flex: 1; padding: 12px 12px 100px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* CARD */
    .card {
      background: white; border-radius: var(--radius-lg); padding: 14px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--gray-200);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .card-title { font-weight: 600; font-size: 0.95rem; }
    .card-meta { font-size: 0.75rem; color: var(--gray-400); }
    .card-body { font-size: 0.85rem; color: var(--gray-600); }

    /* BADGES */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 600;
    }
    .badge-waiting { background: var(--amber-bg); color: var(--amber); }
    .badge-valid { background: var(--green-bg); color: var(--green-dark); }
    .badge-rejected { background: var(--red-bg); color: var(--red); }
    .badge-facture { background: var(--blue-bg); color: var(--blue); }
    .badge-etiquette { background: var(--purple-light); color: var(--purple); }

    /* PHOTO THUMBNAILS */
    .photo-thumbs {
      display: flex; gap: 6px; margin-top: 8px; overflow-x: auto;
      padding-bottom: 4px;
    }
    .photo-thumb {
      width: 60px; height: 60px; border-radius: var(--radius-sm);
      object-fit: cover; border: 1px solid var(--gray-200); cursor: pointer;
      flex-shrink: 0;
    }
    .photo-thumb:active { opacity: .7; }
    .photo-count {
      font-size: 0.75rem; color: var(--gray-400); margin-top: 4px;
    }

    /* FORM */
    .form-section { margin-bottom: 16px; }
    .form-label {
      font-size: 0.8rem; font-weight: 600; color: var(--gray-600);
      margin-bottom: 6px; display: block;
    }
    .form-label.required::after { content: ' *'; color: var(--red); }
    select, input[type="text"], textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200);
      border-radius: var(--radius); font-size: 0.9rem; background: white;
      color: var(--gray-800); -webkit-appearance: none;
    }
    select:focus, input:focus, textarea:focus {
      outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(139,92,246,.15);
    }
    textarea { resize: vertical; min-height: 60px; }

    /* PHOTO CAPTURE */
    .photo-capture-area {
      border: 2px dashed var(--gray-300); border-radius: var(--radius-lg);
      padding: 20px; text-align: center; background: var(--gray-50);
      cursor: pointer; transition: all .2s;
    }
    .photo-capture-area:active { background: var(--purple-light); border-color: var(--purple); }
    .photo-capture-area .icon { font-size: 2rem; margin-bottom: 6px; }
    .photo-capture-area .label { font-size: 0.85rem; color: var(--gray-500); }
    .photo-capture-area .count { font-size: 0.75rem; color: var(--purple); font-weight: 600; margin-top: 4px; }

    /* PHOTO PREVIEW GRID */
    .photo-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .photo-item {
      position: relative; width: 80px; height: 80px;
    }
    .photo-item img {
      width: 100%; height: 100%; border-radius: var(--radius-sm);
      object-fit: cover; border: 1px solid var(--gray-200);
    }
    .photo-item .remove-btn {
      position: absolute; top: -6px; right: -6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--red); color: white; border: 2px solid white;
      font-size: 0.7rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-item .page-num {
      position: absolute; bottom: 2px; left: 2px;
      background: rgba(0,0,0,.6); color: white;
      font-size: 0.65rem; padding: 1px 5px; border-radius: 4px;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 18px; border-radius: var(--radius); border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all .2s;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .5; pointer-events: none; }
    .btn-primary { background: var(--purple); color: white; }
    .btn-primary:active { background: var(--purple-dark); }
    .btn-success { background: var(--green); color: white; }
    .btn-success:active { background: var(--green-dark); }
    .btn-danger { background: var(--red); color: white; }
    .btn-outline {
      background: white; color: var(--purple);
      border: 1px solid var(--purple);
    }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* FAB */
    .fab {
      position: fixed; bottom: 24px; right: 16px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--purple); color: white;
      border: none; font-size: 1.5rem; cursor: pointer;
      box-shadow: 0 4px 12px rgba(139,92,246,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .fab:active { transform: scale(.9); background: var(--purple-dark); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 16px 16px 0 0;
      width: 100%; max-width: 500px; max-height: 90vh;
      overflow-y: auto; padding: 0;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      padding: 16px; border-bottom: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .modal-header h2 { font-size: 1.1rem; color: var(--gray-800); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--gray-100); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 16px; }
    .modal-footer {
      padding: 12px 16px; border-top: 1px solid var(--gray-200);
      display: flex; gap: 8px;
    }

    /* FULLSCREEN IMAGE VIEWER */
    .viewer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.9); z-index: 300;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .viewer-overlay.show { display: flex; }
    .viewer-overlay img {
      max-width: 95%; max-height: 80vh; object-fit: contain;
      border-radius: var(--radius);
    }
    .viewer-nav {
      display: flex; gap: 16px; margin-top: 16px; align-items: center;
    }
    .viewer-nav button {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; background: rgba(255,255,255,.2); color: white;
      font-size: 1.2rem; cursor: pointer;
    }
    .viewer-nav button:active { background: rgba(255,255,255,.4); }
    .viewer-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: rgba(255,255,255,.2); color: white;
      font-size: 1.3rem; cursor: pointer;
    }
    .viewer-page-info {
      color: white; font-size: 0.9rem; font-weight: 600;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--gray-400);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 10px; }
    .empty .text { font-size: 0.9rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--gray-800); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 0.85rem; z-index: 400;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    /* STAT CARDS */
    .stats-row {
      display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
      padding-bottom: 4px;
    }
    .stat-card {
      flex: 1; min-width: 90px; background: white; border-radius: var(--radius);
      padding: 10px; text-align: center; box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
    }
    .stat-card .number { font-size: 1.4rem; font-weight: 700; }
    .stat-card .label { font-size: 0.7rem; color: var(--gray-500); }
    .stat-card.purple .number { color: var(--purple); }
    .stat-card.green .number { color: var(--green); }
    .stat-card.amber .number { color: var(--amber); }

    /* OCR OVERLAY */
    .ocr-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 500; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; gap: 16px;
    }
    .ocr-overlay .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ocr-overlay .ocr-status { font-size: 1rem; font-weight: 600; }
    .ocr-overlay .ocr-progress {
      width: 200px; height: 6px; background: rgba(255,255,255,.2);
      border-radius: 3px; overflow: hidden;
    }
    .ocr-overlay .ocr-progress-fill {
      height: 100%; background: var(--purple); border-radius: 3px;
      transition: width .3s;
    }

    /* OCR TEXT DISPLAY */
    .ocr-text-box {
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 10px; margin-top: 8px;
      font-size: 0.8rem; color: var(--gray-600);
      max-height: 150px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word;
      font-family: 'SF Mono', 'Menlo', monospace;
    }
    .ocr-badge {
      display: inline-block; padding: 2px 6px; border-radius: 8px;
      font-size: 0.65rem; font-weight: 600;
      background: #ede9fe; color: var(--purple);
      margin-left: 4px;
    }

    /* HIDDEN */
    .hidden { display: none !important; }
    .hidden-input { position: absolute; left: -9999px; opacity: 0; }

    /* LOGIN (fallback) */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 20px;
    }
    .login-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--purple); }
    .pin-dots { display: flex; gap: 10px; margin-bottom: 20px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--gray-300); background: white;
    }
    .pin-dot.filled { background: var(--purple); border-color: var(--purple); }
    .pin-grid {
      display: grid; grid-template-columns: repeat(3, 70px); gap: 10px;
    }
    .pin-btn {
      height: 50px; border: 1px solid var(--gray-200); border-radius: var(--radius);
      background: white; font-size: 1.2rem; font-weight: 600; cursor: pointer;
    }
    .pin-btn:active { background: var(--purple-light); }
    .login-error {
      color: var(--red); font-size: 0.85rem; margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<!-- ====== LOGIN SCREEN (fallback) ====== -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-title">🚛 Receptions</div>
  <div class="pin-dots" id="pin-dots"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinAdd('1')">1</button>
    <button class="pin-btn" onclick="pinAdd('2')">2</button>
    <button class="pin-btn" onclick="pinAdd('3')">3</button>
    <button class="pin-btn" onclick="pinAdd('4')">4</button>
    <button class="pin-btn" onclick="pinAdd('5')">5</button>
    <button class="pin-btn" onclick="pinAdd('6')">6</button>
    <button class="pin-btn" onclick="pinAdd('7')">7</button>
    <button class="pin-btn" onclick="pinAdd('8')">8</button>
    <button class="pin-btn" onclick="pinAdd('9')">9</button>
    <button class="pin-btn" onclick="pinClear()">C</button>
    <button class="pin-btn" onclick="pinAdd('0')">0</button>
    <button class="pin-btn" onclick="pinDelete()">←</button>
  </div>
  <div class="login-error" id="login-error"></div>
</div>

<!-- ====== MAIN APP ====== -->
<div id="app-screen" class="hidden" style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <a class="btn-back" href="../">← Retour</a>
      <h1>🚛 Receptions</h1>
    </div>
    <div class="header-right">
      <span id="user-badge"></span>
      <span id="etab-badge"></span>
    </div>
  </div>

  <!-- MAIN TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="factures" onclick="switchMainTab('factures')">📄 Factures/BL</button>
    <button class="tab-btn" data-tab="etiquettes" onclick="switchMainTab('etiquettes')">🏷️ Etiquettes</button>
    <button class="tab-btn" data-tab="historique" onclick="switchMainTab('historique')">📊 Historique</button>
  </div>

  <!-- DATE BAR -->
  <div class="date-bar">
    <button class="date-nav-btn" onclick="changeDate(-1)">‹</button>
    <div class="date-display" id="date-display"></div>
    <button class="date-nav-btn" onclick="changeDate(1)">›</button>
    <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TAB: FACTURES/BL -->
    <div class="tab-content active" id="tab-factures">
      <div class="sub-tabs">
        <button class="sub-tab active" data-sub="all" onclick="filterDocs('factures','all')">Tous</button>
        <button class="sub-tab" data-sub="en_attente" onclick="filterDocs('factures','en_attente')">En attente</button>
        <button class="sub-tab" data-sub="valide" onclick="filterDocs('factures','valide')">Valides</button>
      </div>
      <div id="factures-list"></div>
    </div>

    <!-- TAB: ETIQUETTES -->
    <div class="tab-content" id="tab-etiquettes">
      <div class="sub-tabs">
        <button class="sub-tab active" data-sub="all" onclick="filterDocs('etiquettes','all')">Tous</button>
        <button class="sub-tab" data-sub="en_attente" onclick="filterDocs('etiquettes','en_attente')">En attente</button>
        <button class="sub-tab" data-sub="valide" onclick="filterDocs('etiquettes','valide')">Valides</button>
      </div>
      <div id="etiquettes-list"></div>
    </div>

    <!-- TAB: HISTORIQUE -->
    <div class="tab-content" id="tab-historique">
      <div id="stats-container"></div>
      <div id="historique-list"></div>
    </div>

  </div>

  <!-- FAB: New Document -->
  <button class="fab" id="fab-add" onclick="openNewDocModal()">+</button>

</div>

<!-- ====== MODAL: NEW DOCUMENT ====== -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-new-title">Nouveau document</h2>
      <button class="modal-close" onclick="closeModal('modal-new')">×</button>
    </div>
    <div class="modal-body">

      <!-- Type -->
      <div class="form-section">
        <label class="form-label required">Type de document</label>
        <select id="form-type" onchange="onTypeChange()">
          <option value="facture">📄 Facture / Bon de livraison</option>
          <option value="etiquette">🏷️ Etiquette produit</option>
        </select>
      </div>

      <!-- Fournisseur -->
      <div class="form-section">
        <label class="form-label required">Fournisseur</label>
        <select id="form-fournisseur">
          <option value="">-- Choisir un fournisseur --</option>
        </select>
      </div>

      <!-- Référence (factures only) -->
      <div class="form-section" id="form-ref-section">
        <label class="form-label">Numero facture / BL</label>
        <input type="text" id="form-reference" placeholder="Ex: FA-2026-0042">
      </div>

      <!-- Lien commande (factures only) -->
      <div class="form-section" id="form-commande-section">
        <label class="form-label">Rattacher a une commande</label>
        <select id="form-commande">
          <option value="">-- Aucune --</option>
        </select>
      </div>

      <!-- Document import -->
      <div class="form-section">
        <label class="form-label required">Document scanne</label>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button type="button" onclick="openScannerPro()" style="flex:1;padding:10px 12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:.85rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">
            <span style="font-size:1.1rem;">📷</span> Ouvrir Scanner Pro
          </button>
          <button type="button" onclick="triggerImport()" style="flex:1;padding:10px 12px;background:linear-gradient(135deg,#48bb78,#38a169);color:#fff;border:none;border-radius:10px;font-size:.85rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">
            <span style="font-size:1.1rem;">📄</span> Importer PDF
          </button>
        </div>

  // Process PDF file: extract pages as images + text
  async function processPdfFile(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdf.numPages;

    // Read file as data URI for storage
    const dataUri = await fileToDataUri(file);

    const pageImages = [];
    let fullText = '';

    for (let i = 1; i <= numPages; i++) {
      showOcrOverlay(true, `Page ${i}/${numPages}...`, 10 + (70 * i / numPages));
      const page = await pdf.getPage(i);

      // Render page to canvas (for preview thumbnails — small size for DB)
      const scale = 0.8;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      pageImages.push(canvas.toDataURL('image/jpeg', 0.5));

      // Extract text content (if PDF has text layer — iOS scanner usually does)
      try {
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        if (pageText.trim()) fullText += (fullText ? '\n\n' : '') + pageText.trim();
      } catch (e) { /* no text layer */ }
    }

    // If no text extracted, try OCR on the first page
    if (!fullText.trim() && pageImages.length > 0) {
      showOcrOverlay(true, 'OCR en cours (pas de texte dans le PDF)...', 80);
      fullText = await runOcrOnImage(pageImages[0]);
    }

    importedFile = {
      type: 'pdf',
      dataUri,
      name: file.name,
      pageImages,
      textContent: fullText,
      nbPages: numPages
    };
  }

  // Process image file
  async function processImageFile(file) {
    const rawUri = await fileToDataUri(file);

    // Compress image (iPhone photos are 3-8 MB, too large for Supabase)
    showOcrOverlay(true, 'Compression...', 20);
    const compressed = await compressImage(rawUri, 1400, 0.65);
    const thumbnail = await compressImage(rawUri, 800, 0.5);

    // OCR on the compressed image
    showOcrOverlay(true, 'OCR en cours...', 50);
    const ocrText = await runOcrOnImage(compressed);

    importedFile = {
      type: 'image',
      dataUri: compressed,
      name: file.name,
      pageImages: [thumbnail],
      textContent: ocrText,
      nbPages: 1
    };
  }

  function fileToDataUri(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Compress/resize image to fit Supabase payload limits
  function compressImage(dataUri, maxWidth = 1200, quality = 0.6) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUri); // fallback: return original
      img.src = dataUri;
    });
  }

  // OCR fallback with Tesseract.js
  async function runOcrOnImage(base64Image) {
    try {
      const result = await Tesseract.recognize(base64Image, 'fra', {
        logger: m => {
          if (m.status === 'recognizing text') {
            showOcrOverlay(true, 'Extraction du texte...', 80 + Math.round((m.progress || 0) * 20));
          }
        }
      });
      return (result?.data?.text || '').trim();
    } catch (e) {
      console.error('OCR error:', e);
      return '';
    }
  }

  // ====== SUBMIT DOCUMENT ======
  async function submitDocument() {
    const type = document.getElementById('form-type').value;
    const fournisseurId = document.getElementById('form-fournisseur').value;
    const reference = document.getElementById('form-reference').value.trim();
    const commandeId = document.getElementById('form-commande').value;
    const observation = document.getElementById('form-observation').value.trim();

    if (!fournisseurId) { showToast('Selectionnez un fournisseur', 'error'); return; }
    if (!importedFile) { showToast('Importez un document', 'error'); return; }

    const fournisseur = fournisseurs.find(f => f.id === fournisseurId);
    if (!fournisseur) { showToast('Fournisseur invalide', 'error'); return; }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Enregistrement...';

    try {
      const doc = await DB.insertDocument({
        type,
        fournisseur_id: fournisseurId,
        fournisseur_nom: fournisseur.nom,
        date: dateStr(filterDate),
        reference: type === 'facture' ? reference || null : null,
        commande_id: type === 'facture' && commandeId ? commandeId : null,
        statut: 'en_attente',
        observation: observation || null,
        nb_pages: importedFile.nbPages,
        pdf_data: importedFile.type === 'pdf' ? importedFile.dataUri : null,
        texte_ocr: importedFile.textContent || null,
        user_id: currentUser.id,
        user_nom: currentUser.nom,
        user_initiales: currentUser.initiales,
        etablissement: currentEtablissement
      });

      // Insert page thumbnails
      if (doc && importedFile.pageImages.length) {
        const pages = importedFile.pageImages.map((img, i) => ({
          document_id: doc.id,
          page_num: i + 1,
          photo_data: img,
          texte_ocr: null
        }));
        await DB.insertPages(pages);
      }

      showToast('Document enregistre !', 'success');
      closeModal('modal-new');
      loadDocuments();
    } catch (e) {
      console.error('Erreur enregistrement:', e);
      const msg = e?.message || e?.details || e?.hint || JSON.stringify(e);
      showToast('Erreur d\'enregistrement', 'error');
      setTimeout(() => alert('Erreur Supabase:\n' + msg), 300);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enregistrer';
    }
  }

  // ====== VIEW DOCUMENT ======
  async function viewDocument(docId) {
    const doc = documents.find(d => d.id === docId);
    if (!doc) return;

    document.getElementById('modal-view-title').textContent =
      doc.type === 'facture' ? `Facture/BL - ${esc(doc.fournisseur_nom)}` : `Etiquette - ${esc(doc.fournisseur_nom)}`;

    let pages = [];
    try { pages = await DB.getPages(docId); } catch (e) { console.error(e); }

    const statusLabel = {
      en_attente: '🟡 En attente de validation',
      valide: '✅ Valide',
      rejete: '❌ Rejete'
    }[doc.statut] || doc.statut;

    let body = `
      <div style="margin-bottom:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Fournisseur</div>
        <div style="font-weight:600;">${esc(doc.fournisseur_nom)}</div>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:12px;">
        <div style="flex:1;">
          <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Date</div>
          <div>${new Date(doc.date).toLocaleDateString('fr-FR')}</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Statut</div>
          <div>${statusLabel}</div>
        </div>
      </div>`;

    if (doc.reference) {
      body += `<div style="margin-bottom:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Reference</div>
        <div>${esc(doc.reference)}</div>
      </div>`;
    }

    if (doc.commande_id) {
      const cmd = commandes.find(c => c.id === doc.commande_id);
      body += `<div style="margin-bottom:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Commande rattachee</div>
        <div>${cmd ? esc(cmd.fournisseur_nom) + ' - ' + formatDateShort(cmd.date_creation) : doc.commande_id}</div>
      </div>`;
    }

    if (doc.observation) {
      body += `<div style="margin-bottom:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Observation</div>
        <div>${esc(doc.observation)}</div>
      </div>`;
    }

    body += `<div style="margin-bottom:8px;">
      <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">Enregistre par</div>
      <div>${esc(doc.user_nom)} (${esc(doc.user_initiales || '')}) - ${formatTime(doc.created_at)}</div>
    </div>`;

    if (doc.valide_par_nom) {
      body += `<div style="margin-bottom:8px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:4px;">${doc.statut === 'valide' ? 'Valide' : 'Rejete'} par</div>
        <div>${esc(doc.valide_par_nom)} - ${formatTime(doc.date_validation)}</div>
      </div>`;
    }

    // PDF download button
    if (doc.pdf_data) {
      body += `<div style="margin-top:12px;">
        <button class="btn btn-primary btn-full" onclick="downloadPdf('${doc.id}')">📥 Telecharger le PDF original</button>
      </div>`;
    }

    // Page thumbnails
    if (pages.length) {
      body += `<div style="margin-top:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:6px;">Pages (${pages.length})</div>
        <div class="photo-thumbs">
          ${pages.map((p, i) => `
            <img class="photo-thumb" src="${p.photo_data}" alt="Page ${i+1}"
                 onclick="event.stopPropagation();openViewerFromDoc('${docId}', ${i})">
          `).join('')}
        </div>
      </div>`;
    }

    // OCR text
    const ocrText = doc.texte_ocr;
    if (ocrText) {
      body += `<div style="margin-top:12px;">
        <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:6px;">
          Texte extrait <span class="ocr-badge">AUTO</span>
        </div>
        <div class="ocr-text-box">${esc(ocrText)}</div>
      </div>`;
    }

    document.getElementById('modal-view-body').innerHTML = body;

    let footer = '';
    if (isManager() && doc.statut === 'en_attente') {
      footer = `
        <button class="btn btn-danger btn-sm" onclick="validateDocument('${doc.id}','rejete')" style="flex:1;">Rejeter</button>
        <button class="btn btn-success btn-sm" onclick="validateDocument('${doc.id}','valide')" style="flex:2;">Valider</button>`;
    } else if (doc.statut === 'en_attente') {
      footer = `<div style="width:100%;text-align:center;font-size:.8rem;color:var(--gray-400);">En attente de validation par un manager</div>`;
    }
    document.getElementById('modal-view-footer').innerHTML = footer;
    document.getElementById('modal-view').classList.add('show');
  }

  // Page cache for viewer
  let docPagesCache = {};
  async function openViewerFromDoc(docId, pageIndex) {
    if (!docPagesCache[docId]) docPagesCache[docId] = await DB.getPages(docId);
    viewerPages = docPagesCache[docId].map(p => p.photo_data);
    viewerIndex = pageIndex;
    showViewer();
  }

  // ====== PDF DOWNLOAD ======
  function downloadPdf(docId) {
    const doc = documents.find(d => d.id === docId);
    if (!doc?.pdf_data) { showToast('PDF non disponible', 'error'); return; }
    const link = document.createElement('a');
    link.href = doc.pdf_data;
    const dateLabel = doc.date.replace(/-/g, '');
    const fournLabel = doc.fournisseur_nom.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 20);
    link.download = `${doc.type}_${fournLabel}_${dateLabel}.pdf`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  // ====== VALIDATE DOCUMENT ======
  async function validateDocument(docId, newStatut) {
    try {
      await DB.updateDocument(docId, {
        statut: newStatut,
        valide_par_id: currentUser.id,
        valide_par_nom: currentUser.nom,
        date_validation: new Date().toISOString()
      });
      showToast(newStatut === 'valide' ? 'Document valide !' : 'Document rejete', newStatut === 'valide' ? 'success' : 'error');
      closeModal('modal-view');
      loadDocuments();
    } catch (e) {
      console.error('Erreur validation:', e);
      showToast('Erreur de validation', 'error');
    }
  }

  // ====== HISTORIQUE ======
  async function loadHistorique() {
    const dateTo = dateStr(new Date());
    const dateFrom = dateStr(new Date(Date.now() - 30 * 24 * 60 * 60 * 1000));

    try {
      const stats = await DB.getStats(currentEtablissement, dateFrom, dateTo);
      const allDocs = await DB.getDocumentsRange(currentEtablissement, dateFrom, dateTo);

      const totalFactures = stats.filter(s => s.type === 'facture').length;
      const totalEtiquettes = stats.filter(s => s.type === 'etiquette').length;
      const enAttente = stats.filter(s => s.statut === 'en_attente').length;

      document.getElementById('stats-container').innerHTML = `
        <div class="stats-row">
          <div class="stat-card purple"><div class="number">${totalFactures}</div><div class="label">Factures/BL</div></div>
          <div class="stat-card purple"><div class="number">${totalEtiquettes}</div><div class="label">Etiquettes</div></div>
          <div class="stat-card amber"><div class="number">${enAttente}</div><div class="label">En attente</div></div>
        </div>
        <div style="font-size:.8rem;color:var(--gray-400);margin-bottom:12px;text-align:center;">30 derniers jours</div>`;

      const grouped = {};
      allDocs.forEach(d => {
        if (!grouped[d.date]) grouped[d.date] = [];
        grouped[d.date].push(d);
      });

      let html = '';
      Object.keys(grouped).sort().reverse().forEach(date => {
        const dateLabel = new Date(date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
        html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-500);margin:12px 0 6px;text-transform:capitalize;">${dateLabel} (${grouped[date].length})</div>`;
        grouped[date].forEach(d => html += renderDocCard(d));
      });

      document.getElementById('historique-list').innerHTML = html ||
        '<div class="empty"><div class="icon">📊</div><div class="text">Aucun document sur les 30 derniers jours</div></div>';
    } catch (e) { console.error('Erreur historique:', e); }
  }

  // ====== IMAGE VIEWER ======
  function showViewer() {
    if (!viewerPages.length) return;
    document.getElementById('viewer-img').src = viewerPages[viewerIndex];
    document.getElementById('viewer-info').textContent = `${viewerIndex + 1} / ${viewerPages.length}`;
    document.getElementById('viewer').classList.add('show');
  }
  function closeViewer() { document.getElementById('viewer').classList.remove('show'); }
  function viewerNav(delta) {
    viewerIndex = (viewerIndex + delta + viewerPages.length) % viewerPages.length;
    document.getElementById('viewer-img').src = viewerPages[viewerIndex];
    document.getElementById('viewer-info').textContent = `${viewerIndex + 1} / ${viewerPages.length}`;
  }

  // ====== MODALS ======
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
    if (id === 'modal-view') docPagesCache = {};
  }
  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('show'))
      e.target.classList.remove('show');
  });

  // ====== OVERLAY ======
  function showOcrOverlay(show, status, progress) {
    const overlay = document.getElementById('ocr-overlay');
    overlay.style.display = show ? 'flex' : 'none';
    if (status) document.getElementById('ocr-status').textContent = status;
    if (progress !== undefined) document.getElementById('ocr-progress').style.width = progress + '%';
  }

  // ====== TOAST ======
  let toastTimeout;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ====== SHOW APP ======
  function showApp() {
    document.getElementById('login-screen').classList.add('hidden');
    const app = document.getElementById('app-screen');
    app.classList.remove('hidden');
    app.style.display = 'flex';
    document.getElementById('user-badge').textContent = currentUser.initiales || currentUser.nom;
    const etabName = currentEtablissement === 'freddy' ? 'Freddy' :
                     currentEtablissement === 'liesel' ? 'Liesel' : currentEtablissement;
    document.getElementById('etab-badge').textContent = etabName;
    updateDateDisplay();
    loadFournisseurs();
    loadCommandes();
    loadDocuments();
  }

  // ====== INIT ======
  document.addEventListener('DOMContentLoaded', () => {
    initSupabase();
    const session = checkPortalSession();
    if (session) {
      currentUser = session.user;
      currentEtablissement = session.etablissement;
      showApp();
    } else if (supabaseClient) {
      document.getElementById('login-screen').classList.remove('hidden');
      renderPinDots();
    }
  });
</script>
